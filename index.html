<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Archive - Safe Storage</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400;700&display=swap');

        :root { --bg: #0b0b0b; --card-bg: #141414; --text: #e0e0e0; --accent: #d4af37; --border: #333; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Serif KR', serif; margin: 0; min-height: 100vh; }
        
        header { padding: 40px 20px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: 2.5rem; letter-spacing: 5px; color: var(--accent); margin: 0; }
        .sub-desc { font-style: italic; color: #888; margin-top: 10px; }
        
        .main-container { max-width: 800px; margin: 0 auto; padding: 0 20px 100px; }

        /* 등록 폼 */
        .write-board { background: var(--card-bg); border: 2px solid var(--accent); padding: 35px; margin-bottom: 50px; }
        .write-board h2 { font-family: 'Cinzel', serif; color: var(--accent); text-align: center; margin-bottom: 25px; }
        
        .input-group { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .input-group > div { flex: 1; min-width: 150px; }
        
        label { display: block; font-size: 0.75rem; color: #aaa; margin-bottom: 8px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 15px; border: 1px solid var(--border); background: #0a0a0a; color: #fff; font-family: 'Noto Serif KR', serif; box-sizing: border-box; outline: none; }
        textarea { min-height: 180px; line-height: 1.8; margin-bottom: 20px; }
        
        .btn-submit { background: var(--accent); color: #000; border: none; width: 100%; padding: 18px; font-family: 'Cinzel', serif; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }

        /* 카드 스타일 */
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 40px; margin-bottom: 50px; position: relative; }
        .card-header { display: flex; justify-content: space-between; border-bottom: 1px dashed #444; padding-bottom: 15px; margin-bottom: 25px; }
        .card-meta { font-family: 'Cinzel', serif; font-size: 0.85rem; color: #888; }
        .lyric-text { font-size: 1.15rem; line-height: 2.2; margin-bottom: 40px; white-space: pre-wrap; font-style: italic; color: #eee; text-align: center; }

        /* 하단 도구함 (백업/용량체크) */
        .storage-tools { background: #1a1a1a; padding: 20px; border-top: 1px solid var(--accent); position: fixed; bottom: 0; left: 0; right: 0; display: flex; justify-content: space-around; align-items: center; z-index: 100; font-size: 0.8rem; }
        .tool-btn { background: #333; color: var(--accent); border: 1px solid var(--accent); padding: 8px 15px; cursor: pointer; font-family: 'Cinzel', serif; }
        #storage-bar { width: 100px; height: 10px; background: #000; border: 1px solid #444; display: inline-block; margin-left: 10px; }
        #storage-fill { height: 100%; background: var(--accent); width: 0%; }
        
        .category-menu { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 20px; }
        .category-menu button { background: transparent; border: 1px solid var(--border); color: #888; padding: 10px 20px; cursor: pointer; border-radius: 20px; font-family: 'Cinzel', serif; }
        .category-menu button.active { background: var(--accent); color: #000; border-color: var(--accent); }
    </style>
</head>
<body>

<header>
    <h1>SENTENCE ARCHIVE</h1>
    <p class="sub-desc">기록되지 않은 문장은 사라진다</p>
</header>

<div class="category-menu">
    <button class="tag-btn active" onclick="showMainCategory('ALL', this)">ALL</button
