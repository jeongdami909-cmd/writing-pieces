<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Archive</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400;700&display=swap');
        :root { --bg: #0b0b0b; --card-bg: #141414; --text: #e0e0e0; --accent: #d4af37; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Serif KR', serif; margin: 0; min-height: 100vh; }
        header { padding: 40px 20px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: 2.5rem; letter-spacing: 5px; color: var(--accent); margin: 0; }
        .sub-desc { font-style: italic; color: #888; margin-top: 10px; text-align: center; }
        .category-menu { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 20px; }
        .tag-btn { background: transparent; border: 1px solid var(--border); color: #888; padding: 10px 20px; cursor: pointer; border-radius: 20px; font-family: 'Cinzel', serif; transition: 0.3s; }
        .tag-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
        .main-container { max-width: 800px; margin: 0 auto; padding: 0 20px 100px; }
        .write-board { background: var(--card-bg); border: 2px solid var(--accent); padding: 35px; margin-bottom: 50px; }
        input, select, textarea { width: 100%; padding: 15px; border: 1px solid var(--border); background: #0a0a0a; color: #fff; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        .btn-submit { background: var(--accent); color: #000; border: none; width: 100%; padding: 18px; font-weight: bold; cursor: pointer; font-family: 'Cinzel', serif; width: 100%; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 40px; margin-bottom: 30px; position: relative; }
        .lyric-text { font-size: 1.15rem; line-height: 2.2; text-align: center; font-style: italic; white-space: pre-wrap; color: #eee; }
        .error-msg { color: #ff4444; font-size: 0.8rem; margin-top: 10px; text-align: center; font-weight: bold; }
        .btn-delete { background: none; border: 1px solid #444; color: #666; cursor: pointer; padding: 5px 10px; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <h1>SENTENCE ARCHIVE</h1>
    <p class="sub-desc">기록되지 않은 문장은 사라진다</p>
</header>

<div class="category-menu">
    <button class="tag-btn active" onclick="showMainCategory('ALL', this)">ALL</button>
    <button class="tag-btn" onclick="showMainCategory('MUSIC', this)">MUSIC</button>
    <button class="tag-btn" onclick="showMainCategory('LITERATURE', this)">LITERATURE</button>
    <button class="tag-btn" onclick="showMainCategory('BIBLE', this)">BIBLE</button>
</div>

<div class="main-container">
    <div class="write-board">
        <select id="new-category"><option value="MUSIC">MUSIC</option><option value="LITERATURE">LITERATURE</option><option value="BIBLE">BIBLE</option></select>
        <input type="text" id="new-source" placeholder="출처를 입력하세요">
        <textarea id="new-quote" placeholder="문장을 입력하세요"></textarea>
        <button class="btn-submit" onclick="handleSaveNew()">SAVE TO ARCHIVE</button>
        <div id="storage-error" class="error-msg"></div>
    </div>
    <div id="archiveList"></div>
</div>

<script>
    const STORAGE_KEY = 'sentence_archive_v4';
    let archives = [];
    let currentFilter = 'ALL';

    // 데이터 불러오기 (에러 방어 로직 포함)
    function init() {
        try {
            const data = localStorage.getItem(STORAGE_KEY);
            archives = data ? JSON.parse(data) : [];
            if (!Array.isArray(archives)) archives = [];
        } catch (e) {
            console.error("데이터 로딩 실패:", e);
            archives = []; // 깨진 데이터 처리
        }
        renderList();
    }

    // 저장 기능 (용량 초과 방어 로직)
    window.handleSaveNew = function() {
        const source = document.getElementById('new-source').value;
        const quote = document.getElementById('new-quote').value;
        const category = document.getElementById('new-category').value;
        if(!quote) return alert("내용을 입력해주세요.");

        const newData = { id: Date.now(), category: category, source, chunks: [quote] };
        archives.unshift(newData);

        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(archives));
            document.getElementById('storage-error').innerText = "";
            document.getElementById('new-quote').value = "";
            renderList();
        } catch (e) {
            // 용량 부족 시 대처
            archives.shift();
            document.getElementById('storage-error').innerText = "⚠️ 저장 공간이 부족합니다! 기존 자료를 몇 개 삭제해주세요.";
            alert("저장 실패: 브라우저 용량이 가득 찼습니다.");
        }
    };

    // 필터링 기능 정상화
    window.showMainCategory = function(cat, btn) {
        document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = cat;
        renderList();
    };

    function renderList() {
        const list = document.getElementById('archiveList');
        list.innerHTML = '';
        
        const filtered = currentFilter === 'ALL' ? archives : archives.filter(a => a.category === currentFilter);

        filtered.forEach(a => {
            list.innerHTML += `
                <div class="card">
                    <div style="color:var(--accent); font-weight:bold; margin-bottom:10px;">${a.category} | ${a.source || 'Unknown'}</div>
                    <div class="lyric-text">${a.chunks[0]}</div>
                    <button class="btn-delete" onclick="deleteItem(${a.id})">삭제</button>
                </div>`;
        });
    }

    window.deleteItem = function(id) {
        if(confirm("이 항목을 삭제하여 용량을 확보할까요?")) {
            archives = archives.filter(a => a.id !== id);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(archives));
            renderList();
        }
    };

    window.onload = init;
</script>

</body>
</html>
