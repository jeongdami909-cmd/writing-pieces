    let currentList = [];
    let currentEmoji = "";

    function loadContent(key, btnElement) {
        document.querySelectorAll('.sub-menu button').forEach(b => b.classList.remove('active'));
        btnElement.classList.add('active');

        const data = database[key];
        currentList = data.list;
        currentEmoji = data.emoji;

        document.getElementById('display-card').style.display = 'flex';
        showRandom();
    }

    function showRandom() {
        if (!currentList.length) return;

        const randomIndex = Math.floor(Math.random() * currentList.length);
        const text = currentList[randomIndex];

        document.getElementById('emoji').innerText = currentEmoji;
        document.getElementById('lyric').innerText = text;

        const tweetText = encodeURIComponent(text + "\n\n#SentenceArchive");
        document.getElementById('tw').href =
            `https://twitter.com/intent/tweet?text=${tweetText}`;
    }

    function refresh() {
        showRandom();
    }
