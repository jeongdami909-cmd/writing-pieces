<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Archive</title>

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="My Sentence Archive">
    <meta name="twitter:description" content="나만의 문장 저장소 🦋">
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1516414447565-b14be0adf13e?w=1200">

    <meta property="og:title" content="My Sentence Archive">
    <meta property="og:description" content="나만의 문장 저장소 🦋">
    <meta property="og:image" content="https://images.unsplash.com/photo-1516414447565-b14be0adf13e?w=1200">
    <meta property="og:url" content="https://jeongdami909-cmd.github.io/writing-pieces/">

    <style>
        :root { --bg: #000; --card-bg: #fff; --text: #1a1a1a; --accent: #d4af37; }
        body { background: var(--bg); color: #fff; font-family: 'serif'; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { padding: 40px 20px; text-align: center; }
        h1 { font-size: 1.5rem; letter-spacing: 2px; color: var(--accent); }
        .menu { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 0 20px 40px; max-width: 600px; }
        .menu button { background: transparent; border: 1px solid #444; color: #999; padding: 10px 16px; cursor: pointer; border-radius: 4px; transition: 0.3s; font-size: 0.8rem; }
        .menu button:hover { border-color: var(--accent); color: #fff; }
        .menu button.active { border-color: var(--accent); color: var(--accent); font-weight: bold; }
        .card { background: var(--card-bg); color: var(--text); padding: 50px 30px; border-radius: 0; width: 85%; max-width: 450px; min-height: 250px; display: none; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5); text-align: center; }
        .emoji { font-size: 2rem; margin-bottom: 25px; }
        #lyric { font-size: 1.1rem; line-height: 1.8; margin-bottom: 40px; white-space: pre-line; font-style: italic; word-break: keep-all; }
        .btn-box { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        #refresh-btn, .tw-btn { border: 1px solid #1a1a1a; background: #fff; color: #1a1a1a; padding: 14px; text-decoration: none; font-weight: bold; font-size: 0.85rem; cursor: pointer; text-align: center; }
        .tw-btn { background: #000 !important; color: #fff !important; border: none; }
    </style>
</head>
<body>
<header><h1>SENTENCE ARCHIVE</h1></header>
<div class="menu" id="mainMenu">
    <button onclick="loadContent('hamlet')">HAMLET</button>
    <button onclick="loadContent('tess')">TESS</button>
    <button onclick="loadContent('bird')">심보선 - 새</button>
    <button onclick="loadContent('stone')">김남주 - 돌멩이</button>
    <button onclick="loadContent('bts')">BTS - BUTTERFLY</button>
    <button onclick="loadContent('nct')">NCT - PIANO</button>
</div>
<div id="display-card" class="card">
    <div id="emoji" class="emoji"></div>
    <p id="lyric"></p>
    <div class="btn-box">
        <button onclick="refresh()" id="refresh-btn">NEXT</button>
        <a id="tw" href="#" target="_blank" class="tw-btn">𝕏 POST TO TWITTER</a>
    </div>
</div>
<script>
    let currentCategory = '';
    const database = {
        hamlet: { emoji: "💀", list: ["To be, or not to be, that is the question: Whether 'tis nobler in the mind to suffer the slings and arrows of outrageous fortune, or to take arms against a sea of troubles, and by opposing end them?", "O, that this too too solid flesh would melt, thaw and resolve itself into a dew!", "The rest is silence."] },
        tess: { emoji: "🚩", list: ["'Justice' was done, and the President of the Immortals (in Aeschylean phrase) had ended his sport with Tess.", "It was a black flag."] },
        bird: { emoji: "🕊️", list: ["우리는 사랑을 나눈다.\n무엇을 원하는지도 모른 채.", "너는 날아갈 것이다.\n날아가지 마.\n너는 날아갈 것이다."] },
        stone: { emoji: "🪨", list: ["돌멩이 하나 되자고 했다\n강물 위에 파문 하나 자그맣게 내고", "불이 밀어낼 어둠의 영역 그 얼마일 거냐고"] },
        bts: { emoji: "🦋", list: ["곁에 머물러줄래 내게 약속해줄래", "손 대면 날아갈까 부서질까 겁나"] },
        nct: { emoji: "🎹", list: ["까만 건반과 하얀 건반 사이\n우리가 함께 그린 이 노래", "내 삶의 가장 빛나는 곡 그건 바로 너야"] }
    };
    function loadContent(category) {
        currentCategory = category;
        const btns = document.querySelectorAll('.menu button');
        btns.forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('display-card').style.display = 'flex';
        refresh();
    }
    function refresh() {
        const data = database[currentCategory];
        const pick = data.list[Math.floor(Math.random() * data.list.length)];
        document.getElementById('emoji').innerText = data.emoji;
        document.getElementById('lyric').innerText = pick;
        document.getElementById('tw').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(pick)}`;
    }
</script>
</body>
</html>
