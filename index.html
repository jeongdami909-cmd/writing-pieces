<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --btn-gray: rgba(150, 150, 150, 0.3);
            --text-gray: rgba(200, 200, 200, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0f;
            font-family: 'Pretendard', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 🌆 배경 사진 */
        .building-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            opacity: 0.6; z-index: -2;
        }

        /* 🌑 배경 업로드 칸 (반투명 회색) */
        .bg-setting {
            position: fixed;
            bottom: 20px; right: 20px;
            z-index: 1000;
            background: var(--btn-gray);
            padding: 5px 10px;
            border-radius: 4px;
            backdrop-filter: blur(5px);
        }
        .bg-setting label {
            cursor: pointer;
            color: var(--text-gray);
            font-size: 10px;
        }

        /* 🪟 게시판 그리드 (4열 기본) */
        .facade-grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            gap: 50px;
            padding: 80px 20px;
            z-index: 10;
        }

        /* 80x80 미니 유리창 */
        .glass-board {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            height: 80px;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            cursor: pointer;
        }

        /* 펼쳐졌을 때 (400x650) */
        .glass-board.expanded {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 400px; height: 650px;
            background: rgba(255, 255, 255, 0.98);
            z-index: 2000;
            cursor: default;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }

        /* 🔘 반투명 작은 버튼들 */
        .btn-group {
            position: absolute;
            top: 10px; right: 10px;
            display: none;
            gap: 5px;
            z-index: 2100;
        }
        .glass-board.expanded .btn-group { display: flex; }

        .mini-btn {
            background: var(--btn-gray);
            border: none;
            color: rgba(0, 0, 0, 0.4);
            font-size: 9px;
            padding: 4px 8px;
            border-radius: 2px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .mini-btn:hover { background: rgba(0,0,0,0.1); color: #3f51b5; }

        /* 사진 & 텍스트 영역 */
        .photo-space { width: 100%; height: 100%; background: rgba(0,0,0,0.05); overflow: hidden; }
        .glass-board.expanded .photo-space { height: 260px; cursor: pointer; }
        .photo-space img { width: 100%; height: 100%; object-fit: cover; }

        .text-space { padding: 30px; display: none; }
        .glass-board.expanded .text-space { display: block; }
        .text-space h3 { margin: 0 0 10px 0; color: #3f51b5; outline: none; }
        .text-space p { font-size: 14px; line-height: 1.8; color: #333; outline: none; white-space: pre-wrap; max-height: 280px; overflow-y: auto; }

        /* ➕ 늘리기 버튼 (2개씩 추가) */
        .add-row-container {
            padding-bottom: 100px;
            z-index: 10;
        }
        .add-btn {
            background: var(--btn-gray);
            border: none;
            color: var(--text-gray);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            backdrop-filter: blur(5px);
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; z-index: 1500;
        }
        .overlay.active { display: block; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="building-bg" id="bgLayer"></div>
<div class="overlay" id="overlay"></div>

<div class="bg-setting">
    <label for="bgUpload">BG PHOTO +</label>
    <input type="file" id="bgUpload" accept="image/*">
</div>

<div class="facade-grid" id="mainGrid"></div>

<div class="add-row-container">
    <button class="add-btn" onclick="addTwoBoards()">+ ADD 2 WINDOWS</button>
</div>

<script>
    const grid = document.getElementById('mainGrid');
    const bgLayer = document.getElementById('bgLayer');
    const overlay = document.getElementById('overlay');

    // 배경 로드
    const savedBg = localStorage.getItem('win-site-bg');
    if (savedBg) bgLayer.style.backgroundImage = `url(${savedBg})`;

    document.getElementById('bgUpload').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            bgLayer.style.backgroundImage = `url(${ev.target.result})`;
            localStorage.setItem('win-site-bg', ev.target.result);
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    // 초기 보드 개수 확인 (기본 8개)
    let boardCount = parseInt(localStorage.getItem('board-count')) || 8;

    function renderBoards() {
        grid.innerHTML = '';
        for (let i = 1; i <= boardCount; i++) {
            createBoard(i);
        }
    }

    function createBoard(id) {
        const board = document.createElement('div');
        board.className = 'glass-board';
        board.id = `board-${id}`;
        
        const saved = JSON.parse(localStorage.getItem(`win-data-${id}`)) || { title: `Windows ${id}`, text: '내용을 입력하세요.', img: '' };

        board.innerHTML = `
            <div class="btn-group">
                <button class="mini-btn" onclick="saveData(${id}, event)">고정</button>
                <button class="mini-btn" onclick="deleteData(${id}, event)">삭제</button>
            </div>
            <input type="file" id="file-${id}" accept="image/*">
            <div class="photo-space" onclick="triggerFile(${id}, event)">
                <img src="${saved.img}" id="img-${id}" style="${saved.img ? 'display:block' : 'display:none'}">
            </div>
            <div class="text-space">
                <h3 contenteditable="true" id="title-${id}">${saved.title}</h3>
                <p contenteditable="true" id="text-${id}">${saved.text}</p>
            </div>
        `;

        board.onclick = function(e) {
            if (!this.classList.contains('expanded') && e.target.tagName !== 'BUTTON') {
                this.classList.add('expanded');
                overlay.classList.add('active');
            }
        };

        grid.appendChild(board);

        board.querySelector('input').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById(`img-${id}`).src = ev.target.result;
                document.getElementById(`img-${id}`).style.display = 'block';
            };
            reader.readAsDataURL(e.target.files[0]);
        });
    }

    function addTwoBoards() {
        boardCount += 2;
        localStorage.setItem('board-count', boardCount);
        createBoard(boardCount - 1);
        createBoard(boardCount);
    }

    function triggerFile(id, e) {
        if (document.getElementById(`board-${id}`).classList.contains('expanded')) {
            e.stopPropagation();
            document.getElementById(`file-${id}`).click();
        }
    }

    function saveData(id, e) {
        e.stopPropagation();
        const title = document.getElementById(`title-${id}`).innerText;
        const text = document.getElementById(`text-${id}`).innerText;
        const img = document.getElementById(`img-${id}`).src;
        const data = { title, text, img: img.startsWith('data:') ? img : '' };
        localStorage.setItem(`win-data-${id}`, JSON.stringify(data));
        alert('Windows에 고정되었습니다.');
    }

    function deleteData(id, e) {
        e.stopPropagation();
        if(confirm('이 칸의 내용을 초기화할까요?')) {
            localStorage.removeItem(`win-data-${id}`);
            location.reload();
        }
    }

    overlay.onclick = function() {
        const expanded = document.querySelector('.glass-board.expanded');
        if (expanded) expanded.classList.remove('expanded');
        this.classList.remove('active');
    };

    renderBoards();
</script>
</body>
</html>
