<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Archive</title>
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="My Sentence Archive">
    <meta name="twitter:description" content="나만의 문장 저장소 🦋">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&family=Cinzel:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;700&display=swap');

        /* ==========================================
           1. 메인 아카이브 및 게시판 스타일 (블랙 & 골드)
           ========================================== */
        :root { --bg: #0b0b0b; --card-bg: #141414; --text: #e0e0e0; --accent: #d4af37; --border: #333; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Serif KR', 'serif'; margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        header { padding: 50px 20px 30px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: 2.5rem; letter-spacing: 5px; color: var(--accent); margin: 0; text-shadow: 0 0 15px rgba(212,175,55,0.2); }
        .sub-desc { font-family: 'Playfair Display', serif; font-style: italic; color: #888; margin-top: 10px; font-size: 1rem; }
        
        /* 메인 필터 (대분류) */
        .category-menu { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 0 20px 20px; max-width: 900px; margin: 0 auto; }
        .category-menu button { background: transparent; border: 1px solid var(--border); color: #888; padding: 8px 18px; cursor: pointer; border-radius: 20px; transition: 0.3s; font-size: 0.85rem; font-family: 'Cinzel', 'Noto Serif KR', serif; letter-spacing: 1px; }
        .category-menu button:hover { border-color: var(--accent); color: var(--accent); }
        .category-menu button.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
        .btn-special { color: #d4af37 !important; border-color: #d4af37 !important; font-weight: bold; }

        /* 서브 필터 (하위 버튼) */
        .sub-filter-bar { display: none; padding: 15px 20px 25px; justify-content: center; flex-wrap: wrap; gap: 8px; background: transparent; border-bottom: 1px dashed var(--border); max-width: 800px; margin: 0 auto 30px; }
        .sub-filter-bar.open { display: flex; animation: fadeIn 0.3s ease; }
        .sub-tag-btn { background: #1a1a1a; border: 1px solid #444; color: #aaa; font-family: 'Noto Serif KR', serif; font-size: 0.85rem; padding: 6px 16px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .sub-tag-btn:hover { border-color: var(--accent); color: var(--accent); }
        .sub-tag-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        /* 스페셜 전용 서브 메뉴 */
        #sub-special { border-bottom: none; margin-bottom: 0; }
        #sub-special button { font-family: 'Cinzel', sans-serif; font-size: 0.8rem; border-radius: 4px; border: 1px solid; }

        .main-container { max-width: 800px; margin: 0 auto; padding: 0 20px 100px; }

        /* 글쓰기 게시판 */
        .write-board { background: var(--card-bg); border: 1px solid var(--accent); padding: 35px; margin-bottom: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .write-board h2 { font-family: 'Cinzel', serif; font-size: 1.2rem; color: var(--accent); margin-bottom: 25px; text-align: center; letter-spacing: 3px; }
        
        .input-group { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .input-group > div { flex: 1; min-width: 200px; }
        
        label { display: block; font-family: 'Cinzel', serif; font-size: 0.75rem; color: #aaa; margin-bottom: 8px; letter-spacing: 1.5px; }
        input, select, textarea { width: 100%; padding: 15px; border: 1px solid var(--border); background: #0a0a0a; color: #fff; font-family: 'Noto Serif KR', serif; font-size: 0.95rem; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); }
        textarea { min-height: 180px; line-height: 1.8; resize: vertical; margin-bottom: 20px; }
        
        .btn-submit { background: var(--accent); color: #000; border: none; width: 100%; padding: 16px; font-family: 'Cinzel', serif; font-size: 1rem; font-weight: bold; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .btn-submit:hover { background: #fff; }

        /* 📜 목차 서랍 */
        .archive-index { background: #111; border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 25px; margin-bottom: 50px; display: none; }
        .archive-index.show { display: block; animation: fadeIn 0.5s ease; }
        .archive-index h3 { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--accent); margin-top: 0; margin-bottom: 15px; letter-spacing: 2px; border-bottom: 1px dashed var(--border); padding-bottom: 10px; }
        .index-list { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
        .index-item { font-size: 0.95rem; color: #ccc; cursor: pointer; padding-left: 15px; position: relative; transition: color 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .index-item::before { content: '▸'; position: absolute; left: 0; color: var(--accent); font-size: 0.8rem; top: 2px; }
        .index-item:hover { color: var(--accent); text-decoration: underline; text-underline-offset: 4px; }

        /* 문장 카드 */
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 40px; margin-bottom: 50px; scroll-margin-top: 80px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dashed var(--border); flex-wrap: wrap; gap: 15px; }
        .card-meta { font-family: 'Cinzel', 'Noto Serif KR', serif; font-size: 0.9rem; color: var(--accent); letter-spacing: 1px; line-height: 1.4; }
        .card-meta-sub { color: #888; font-size: 0.8rem; margin-top: 5px; display: block; }
        
        /* 🚨 수정 / 삭제 버튼 명확하게 */
        .card-actions { display: flex; gap: 8px; }
        .btn-action { background: #222; border: 1px solid #444; color: #eee; font-size: 0.75rem; padding: 6px 12px; cursor: pointer; font-family: 'Noto Serif KR', serif; letter-spacing: 1px; border-radius: 4px; transition: 0.2s; }
        .btn-action:hover { border-color: var(--accent); color: var(--accent); }
        .btn-action.del:hover { border-color: #c0392b; background: #c0392b; color: #fff; }
        
        .lyric-text { font-size: 1.1rem; line-height: 2.2; margin-bottom: 30px; white-space: pre-wrap; font-style: italic; color: #dfdfdf; word-break: keep-all; }
        
        /* 🚨 사진 영역 */
        .photo-frame-main { margin-bottom: 30px; text-align: center; }
        .photo-frame-main img { width: 100%; max-height: 450px; object-fit: cover; border: 1px solid var(--border); }
        
        .tw-btn { display: block; border: 1px solid var(--border); background: #000; color: #fff; padding: 14px; text-decoration: none; font-size: 0.85rem; font-weight: bold; text-align: center; letter-spacing: 2px; transition: 0.3s; }
        .tw-btn:hover { border-color: var(--accent); color: var(--accent); }

        /* 수정 모달 */
        .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-bg.open { display: flex; }
        .modal { background: var(--card-bg); width: 100%; max-width: 600px; padding: 40px; border: 1px solid var(--accent); max-height: 90vh; overflow-y: auto; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex: 1; padding: 15px; border: none; font-family: 'Noto Serif KR', serif; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #333; color: #fff; }

        /* ==========================================
           2. 스페셜 페이지 숨김처리용
           ========================================== */
        #special-content-wrapper { display: none; }
        #main-archive-wrapper { display: block; }
        #keanu-poster-wrapper, #george-wrapper, #philosophy-wrapper { display: none; }

        /* (스페셜 페이지 디자인 코드는 공간 제약상 그대로 유지된다고 가정합니다. 이전 답변의 CSS와 동일하게 작동합니다.) */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <h1>SENTENCE ARCHIVE</h1>
    <p class="sub-desc">기록되지 않은 문장은 사라진다</p>
</header> 

<div class="category-menu">
    <button class="tag-btn active" onclick="filterMain('ALL', this)">ALL</button>
    <button class="tag-btn" onclick="filterMain('MUSIC', this)">MUSIC</button>
    <button class="tag-btn" onclick="filterMain('LITERATURE', this)">LITERATURE</button>
    <button class="tag-btn" onclick="filterMain('BIBLE', this)">BIBLE</button>
    <button class="tag-btn btn-special" onclick="showSpecialMenu(this)">SPECIAL EXHIBITION</button>
</div> 

<div class="sub-filter-bar" id="subFilterBar"></div>

<div id="sub-special" class="sub-filter-bar">
    <button onclick="loadSpecial('keanu', this)" style="color: #f2ead8; background: #c0392b; border-color: #c0392b;">#KEANU REEVES</button>
    <button onclick="loadSpecial('george', this)" style="color: #F9F6F0; background: #1B263B; border-color: #C5A880;">#GEORGE VI</button>
    <button onclick="loadSpecial('philosophy', this)" style="color: #fff; background: #1a1a1a; border-color: #888;">#PHILOSOPHY</button>
</div>

<div id="main-archive-wrapper">
    <div class="main-container">
        
        <div class="write-board">
            <h2>ADD NEW RECORD</h2>
            
            <div class="input-group">
                <div>
                    <label>MAIN CATEGORY (대분류)</label>
                    <select id="new-category">
                        <option value="MUSIC">MUSIC (음악)</option>
                        <option value="LITERATURE">LITERATURE (문학)</option>
                        <option value="BIBLE">BIBLE (말씀)</option>
                    </select>
                </div>
                <div>
                    <label>SUB-TAG (하위태그)</label>
                    <input type="text" id="new-sub" placeholder="예: BTS, 발라드, 시, 소설">
                </div>
            </div>

            <label>TITLE / SOURCE (출처 혹은 제목)</label>
            <input type="text" id="new-source" placeholder="예: 방탄소년단 - 봄날, 햄릿">
            
            <label>SENTENCE (문장)</label>
            <textarea id="new-quote" placeholder="마음에 남은 문장을 이곳에 기록하세요."></textarea>
            
            <label>📸 IMAGE URL (사진 링크 빈칸)</label>
            <input type="text" id="new-img" placeholder="JPG, PNG 등 이미지 링크를 넣으세요 (선택사항)">
            
            <button class="btn-submit" onclick="handleSaveNew()">SAVE TO ARCHIVE (저장하기)</button>
        </div>

        <div id="archiveIndex" class="archive-index"></div>

        <div id="archiveList"></div>
    </div>
</div>

<div id="special-content-wrapper">
    <div style="text-align:center; color:#888; padding:50px;">
        <p>Special pages are preserved here.</p>
    </div>
</div>

<div class="modal-bg" id="modalBg">
    <div class="modal">
        <h2 style="font-family:'Cinzel', serif; text-align:center; margin-bottom:25px; color:var(--accent);">EDIT RECORD (수정)</h2>
        <div class="input-group">
            <div>
                <label>CATEGORY</label>
                <select id="edit-category">
                    <option value="MUSIC">MUSIC</option><option value="LITERATURE">LITERATURE</option><option value="BIBLE">BIBLE</option>
                </select>
            </div>
            <div><label>SUB-TAG</label><input type="text" id="edit-sub"></div>
        </div>
        <label>TITLE / SOURCE</label><input type="text" id="edit-source">
        <label>SENTENCE</label><textarea id="edit-quote" style="min-height:250px;"></textarea>
        <label>📸 IMAGE URL (사진 링크)</label><input type="text" id="edit-img">
        
        <div class="modal-btns">
            <button class="btn-submit" onclick="handleSaveEdit()">UPDATE (수정 완료)</button>
            <button class="btn-cancel" onclick="closeModal()">CANCEL (취소)</button>
        </div>
    </div>
</div>

<script>
    // 🚨 대분류별 하위 태그 매핑 데이터
    const subCategoryMap = {
        'MUSIC': ['BTS', '발라드', '아이돌', '힙합', '팝', '일본곡', '락'],
        'LITERATURE': ['시', '소설', '고전문학'],
        'BIBLE': ['시편', '잠언', '복음서']
    };

    let currentMainCat = 'ALL';
    let currentSubCat = 'ALL';
    let editTargetId = null;

    // 🌸 기존 데이터를 하위 태그에 맞게 영혼 끌어모아 복원
    let archives = JSON.parse(localStorage.getItem('sentence_archive_v3') || '[]');
    
    if(archives.length === 0) {
        archives = [
            { id: 101, category: 'MUSIC', sub: 'BTS', source: '방탄소년단 - 봄날 🌸', quote: '여긴 온통 겨울 뿐이야 8월에도 겨울이 와\n마음은 시간을 달려가네 홀로 남은 설국열차', img: '' },
            { id: 102, category: 'MUSIC', sub: 'BTS', source: '방탄소년단 - BUTTERFLY 🦋', quote: '시간을 멈출래 이 순간이 지나면\n없었던 일이 될까 널 잃을까\n겁나 겁나 겁나', img: '' },
            { id: 108, category: 'MUSIC', sub: '아이돌', source: 'NCT - PIANO 🎹', quote: '햇살 아래 부서지는 하얀 건반\n그 위를 걷는 너의 손가락 끝에', img: '' },
            { id: 109, category: 'MUSIC', sub: '힙합', source: '이센스 - 독 🐍', quote: '시간 지나면서 내 몸에 쌓인 독\n자유롭고 싶은 게 전보다 훨씬 더 심해진 요즘', img: '' },
            { id: 110, category: 'MUSIC', sub: '힙합', source: '에픽하이 - 빈차 🚕', quote: '갈 길이 먼데\n빈차가 없네\n비가 올 것 같은데', img: '' },
            { id: 113, category: 'MUSIC', sub: '발라드', source: '전람회 - 이방인 🍂', quote: '쉴곳을 찾아서\n결국 또 난 여기까지 왔지', img: '' },
            { id: 201, category: 'LITERATURE', sub: '고전문학', source: '셰익스피어 - 햄릿 💀', quote: 'To be, or not to be, that is the question.', img: '' },
            { id: 204, category: 'LITERATURE', sub: '시', source: '김남주 - 돌멩이 🪨', quote: '친구와 나 제방을 걸으며\n돌멩이 하나 되자고 했다', img: '' },
            { id: 301, category: 'BIBLE', sub: '시편', source: '시편 1편 📜', quote: '복 있는 사람은 악인들의 꾀를 따르지 아니하며...', img: '' }
        ];
        localStorage.setItem('sentence_archive_v3', JSON.stringify(archives));
    }

    // 하위 필터 바 그리기
    function renderSubFilters() {
        const subBar = document.getElementById('subFilterBar');
        if(currentMainCat === 'ALL') {
            subBar.classList.remove('open');
            return;
        }
        
        subBar.classList.add('open');
        const subs = subCategoryMap[currentMainCat] || [];
        
        let html = `<button class="sub-tag-btn ${currentSubCat === 'ALL' ? 'active' : ''}" onclick="filterSub('ALL', this)">전체 보기</button>`;
        
        subs.forEach(sub => {
            const isActive = currentSubCat === sub ? 'active' : '';
            html += `<button class="sub-tag-btn ${isActive}" onclick="filterSub('${sub}', this)">${sub}</button>`;
        });
        
        subBar.innerHTML = html;
    }

    // 리스트 및 목차 서랍 그리기
    function renderList() {
        const list = document.getElementById('archiveList');
        const indexBox = document.getElementById('archiveIndex');
        list.innerHTML = '';
        
        // 필터링 적용
        let filtered = archives;
        if(currentMainCat !== 'ALL') {
            filtered = filtered.filter(a => a.category === currentMainCat);
        }
        if(currentSubCat !== 'ALL') {
            filtered = filtered.filter(a => a.sub && a.sub.includes(currentSubCat));
        }

        // 📜 목차 서랍 생성
        if(filtered.length > 0 && currentMainCat !== 'ALL') {
            let indexHtml = `<h3>📜 INDEX (${filtered.length} sentences)</h3><ul class="index-list">`;
            filtered.forEach(a => {
                indexHtml += `<li class="index-item" onclick="document.getElementById('card-${a.id}').scrollIntoView({behavior: 'smooth'})">${a.source}</li>`;
            });
            indexHtml += `</ul>`;
            indexBox.innerHTML = indexHtml;
            indexBox.classList.add('show');
        } else {
            indexBox.classList.remove('show');
            indexBox.innerHTML = '';
        }
        
        // 카드 렌더링
        filtered.forEach(a => {
            const tweetText = encodeURIComponent(`"${a.quote}"\n- ${a.source}\n\n#SentenceArchive`);
            const subDisplay = a.sub ? `<span class="card-meta-sub">🏷️ ${a.sub}</span>` : '';
            
            list.innerHTML += `
                <div class="card" id="card-${a.id}">
                    <div class="card-header">
                        <div>
                            <span class="card-meta">${a.category} | ${a.source}</span>
                            ${subDisplay}
                        </div>
                        <div class="card-actions">
                            <button class="btn-action" onclick="openEditModal(${a.id})">✏️ EDIT (수정)</button>
                            <button class="btn-action del" onclick="deleteArchive(${a.id})">🗑️ ERASE (삭제)</button>
                        </div>
                    </div>
                    <div class="lyric-text">${a.quote}</div>
                    ${a.img ? `<div class="photo-frame-main"><img src="${a.img}" onerror="this.style.display='none'"></div>` : ''}
                    <a href="https://twitter.com/intent/tweet?text=${tweetText}" target="_blank" class="tw-btn">𝕏 POST TO TWITTER</a>
                </div>
            `;
        });
    }

    // 카테고리 클릭 시
    function filterMain(cat, btn) {
        document.querySelectorAll('.category-menu button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        document.getElementById('sub-special').classList.remove('active');
        document.getElementById('special-content-wrapper').style.display = 'none';
        document.getElementById('main-archive-wrapper').style.display = 'block';

        currentMainCat = cat;
        currentSubCat = 'ALL'; // 메인 카테고리가 바뀌면 서브는 전체로 초기화
        
        renderSubFilters();
        renderList();
    }

    // 서브 카테고리 클릭 시
    function filterSub(sub, btn) {
        document.querySelectorAll('.sub-filter-bar .sub-tag-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentSubCat = sub;
        renderList();
    }

    // 스페셜 전시관
    function showSpecialMenu(btn) {
        document.querySelectorAll('.category-menu button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        document.getElementById('subFilterBar').classList.remove('open');
        document.getElementById('main-archive-wrapper').style.display = 'none';
        document.getElementById('sub-special').classList.add('active');
    }

    // ==========================================
    // 데이터 저장/수정/삭제 로직
    // ==========================================
    function handleSaveNew() {
        const quote = document.getElementById('new-quote').value;
        if(!quote) return alert("문장을 입력해 주세요.");

        archives.unshift({
            id: Date.now(),
            category: document.getElementById('new-category').value,
            sub: document.getElementById('new-sub').value || '',
            source: document.getElementById('new-source').value || 'Unknown',
            quote: quote,
            img: document.getElementById('new-img').value
        });
        
        localStorage.setItem('sentence_archive_v3', JSON.stringify(archives));
        
        document.getElementById('new-sub').value = ''; 
        document.getElementById('new-source').value = ''; 
        document.getElementById('new-quote').value = ''; 
        document.getElementById('new-img').value = '';
        
        renderList();
    }

    function openEditModal(id) {
        editTargetId = id;
        const a = archives.find(i => i.id === id);
        document.getElementById('edit-category').value = a.category; 
        document.getElementById('edit-sub').value = a.sub || ''; 
        document.getElementById('edit-source').value = a.source; 
        document.getElementById('edit-quote').value = a.quote; 
        document.getElementById('edit-img').value = a.img || '';
        document.getElementById('modalBg').classList.add('open');
    }
    function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

    function handleSaveEdit() {
        const idx = archives.findIndex(a => a.id === editTargetId);
        archives[idx] = { 
            id: editTargetId, 
            category: document.getElementById('edit-category').value, 
            sub: document.getElementById('edit-sub').value, 
            source: document.getElementById('edit-source').value, 
            quote: document.getElementById('edit-quote').value, 
            img: document.getElementById('edit-img').value 
        };
        localStorage.setItem('sentence_archive_v3', JSON.stringify(archives));
        renderList(); closeModal();
    }

    function deleteArchive(id) {
        if(confirm("이 문장을 영구히 삭제하시겠습니까?")) {
            archives = archives.filter(a => a.id !== id);
            localStorage.setItem('sentence_archive_v3', JSON.stringify(archives));
            renderList();
        }
    }

    renderList();
</script>
</body>
