<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Archive - Unlimited Storage</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400;700&display=swap');
        :root { --bg: #0b0b0b; --card-bg: #141414; --text: #e0e0e0; --accent: #d4af37; --border: #333; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Serif KR', serif; margin: 0; min-height: 100vh; }
        
        header { padding: 40px 20px 20px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: 2.5rem; letter-spacing: 5px; color: var(--accent); margin: 0; }
        
        .category-menu { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding: 20px; }
        .tag-btn { background: transparent; border: 1px solid var(--border); color: #888; padding: 10px 20px; cursor: pointer; border-radius: 20px; font-family: 'Cinzel', serif; transition: 0.3s; }
        .tag-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

        /* 🔎 검색창 스타일 */
        .search-container { max-width: 800px; margin: 0 auto 30px; padding: 0 20px; }
        .search-wrapper { position: relative; border: 1px solid var(--border); background: #0a0a0a; display: flex; align-items: center; padding: 5px 15px; transition: 0.3s; }
        .search-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 10px rgba(212,175,55,0.1); }
        .search-input { background: transparent; border: none; color: #fff; width: 100%; padding: 12px; font-family: 'Noto Serif KR', serif; outline: none; font-size: 0.95rem; }
        .search-icon { color: var(--accent); margin-right: 10px; font-size: 0.9rem; font-family: 'Cinzel'; }

        .main-container { max-width: 800px; margin: 0 auto; padding: 0 20px 100px; }
        .write-board { background: var(--card-bg); border: 2px solid var(--accent); padding: 35px; margin-bottom: 50px; }
        input, select, textarea { width: 100%; padding: 15px; border: 1px solid var(--border); background: #0a0a0a; color: #fff; font-family: 'Noto Serif KR', serif; box-sizing: border-box; outline: none; margin-bottom: 20px; }
        
        .btn-submit { background: var(--accent); color: #000; border: none; width: 100%; padding: 18px; font-weight: bold; cursor: pointer; font-family: 'Cinzel', serif; width: 100%; }
        
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 40px; margin-bottom: 30px; position: relative; }
        .card-header { display: flex; justify-content: space-between; border-bottom: 1px dashed #444; padding-bottom: 15px; margin-bottom: 25px; }
        .lyric-text { font-size: 1.15rem; line-height: 2.2; text-align: center; font-style: italic; white-space: pre-wrap; color: #eee; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        
        .btn-box { display: flex; flex-direction: column; gap: 10px; margin-top: 30px; }
        .btn-yellow { border: none; background: var(--accent); color: #000; padding: 18px; font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer; }
        .tw-btn { border: 1px solid #444; background: #000; color: #fff; padding: 15px; text-decoration: none; font-size: 0.85rem; text-align: center; font-family: 'Cinzel', serif; }
    </style>
</head>
<body>

<header>
    <h1>SENTENCE ARCHIVE</h1>
</header>

<div class="category-menu">
    <button class="tag-btn active" onclick="showMainCategory('ALL', this)">ALL</button>
    <button class="tag-btn" onclick="showMainCategory('MUSIC', this)">MUSIC</button>
    <button class="tag-btn" onclick="showMainCategory('LITERATURE', this)">LITERATURE</button>
    <button class="tag-btn" onclick="showMainCategory('BIBLE', this)">BIBLE</button>
</div>

<div class="search-container">
    <div class="search-wrapper">
        <span class="search-icon">SEARCH</span>
        <input type="text" id="search-input" class="search-input" placeholder="키워드를 입력하고 Enter를 누르세요..." onkeyup="if(window.event.keyCode==13){handleSearch()}">
    </div>
</div>

<div class="main-container">
    <div class="write-board" id="writeBoard">
        <h2 style="text-align:center; color:var(--accent); font-family:'Cinzel';">ADD RECORD (Unlimited)</h2>
        <select id="new-category"><option value="MUSIC">MUSIC</option><option value="LITERATURE">LITERATURE</option><option value="BIBLE">BIBLE</option></select>
        <input type="text" id="new-source" placeholder="출처 (가수/제목)">
        <textarea id="new-quote" placeholder="문장을 입력하세요. (엔터 두 번으로 구분)"></textarea>
        <button class="btn-submit" onclick="handleSaveNew()">SAVE TO ARCHIVE</button>
    </div>
    <div id="archiveList"></div>
</div>

<script>
    const DB_NAME = 'SentenceDB';
    const STORE_NAME = 'sentences';
    let db;
    let archives = [];
    let chunkState = {};
    let currentFilter = 'ALL';
    let currentEditId = null;
    let searchQuery = ''; // 💡 검색어 상태 저장

    async function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                }
            };
            request.onsuccess = async (e) => {
                db = e.target.result;
                await migrateFromLocalStorage();
                await loadData();
                resolve();
            };
            request.onerror = (e) => reject(e.target.error);
        });
    }

    async function migrateFromLocalStorage() {
        const oldData = localStorage.getItem('sentence_archive_v4');
        if (oldData) {
            const parsed = JSON.parse(oldData);
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            for (const item of parsed) { store.put(item); }
            localStorage.removeItem('sentence_archive_v4');
        }
    }

    async function loadData() {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.getAll();
        request.onsuccess = () => {
            archives = request.result.sort((a, b) => b.id - a.id);
            renderList();
        };
    }

    // 💡 검색 실행 함수
    function handleSearch() {
        searchQuery = document.getElementById('search-input').value.trim();
        renderList();
    }

    function renderList() {
        const list = document.getElementById('archiveList');
        list.innerHTML = '';
        
        // 1. 카테고리 필터링
        let filtered = currentFilter === 'ALL' ? archives : archives.filter(a => a.category === currentFilter);

        // 💡 2. 검색어 필터링 추가
        if (searchQuery !== '') {
            const q = searchQuery.toLowerCase();
            filtered = filtered.filter(a => 
                a.source.toLowerCase().includes(q) || 
                a.chunks.some(chunk => chunk.toLowerCase().includes(q))
            );
        }

        filtered.forEach(a => {
            chunkState[a.id] = { index: 0, max: a.chunks.length, source: a.source, chunks: a.chunks };
            const firstChunk = a.chunks[0];
            const tweetText = encodeURIComponent(`"${firstChunk}"\n- ${a.source}\n#SentenceArchive`);
            
            list.innerHTML += `
                <div class="card">
                    <div class="card-header">
                        <span style="color:#888;">${a.category}</span>
                        <div>
                            <button onclick="editArchive(${a.id})" style="background:none; border:none; cursor:pointer;">✏️</button>
                            <button onclick="deleteItem(${a.id})" style="background:none; border:none; cursor:pointer;">🗑️</button>
                        </div>
                    </div>
                    <div style="text-align:center; font-weight:bold; color:var(--accent); margin-bottom:10px;">${a.source}</div>
                    <div id="counter-${a.id}" style="text-align:center; font-size:0.8rem; color:#666; margin-bottom:15px;">[ 1 / ${a.chunks.length} ]</div>
                    <div class="lyric-text" id="lyric-${a.id}">${firstChunk}</div>
                    <div class="btn-box">
                        <button class="btn-yellow" onclick="nextChunk(${a.id})">NEXT SENTENCE</button>
                        <a id="tw-${a.id}" href="https://twitter.com/intent/tweet?text=${tweetText}" target="_blank" class="tw-btn">𝕏 POST TO TWITTER</a>
                    </div>
                </div>`;
        });
    }

    window.handleSaveNew = async function() {
        const source = document.getElementById('new-source').value;
        const quote = document.getElementById('new-quote').value;
        const category = document.getElementById('new-category').value;
        if (!quote.trim()) return alert("내용을 입력해주세요.");

        const chunkArray = quote.split(/\n\s*\n/).filter(c => c.trim() !== '');
        const newData = { id: currentEditId || Date.now(), category, source, chunks: chunkArray };

        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.put(newData);

        tx.oncomplete = () => {
            document.getElementById('new-quote').value = "";
            document.getElementById('new-source').value = "";
            currentEditId = null;
            document.querySelector('.write-board h2').innerText = 'ADD RECORD (Unlimited)';
            loadData();
        };
    };

    window.nextChunk = function(id) {
        let state = chunkState[id];
        if(!state || state.max <= 1) return;
        state.index = (state.index + 1) % state.max;
        const currentText = state.chunks[state.index];
        document.getElementById(`lyric-${id}`).innerText = currentText;
        document.getElementById(`counter-${id}`).innerText = `[ ${state.index + 1} / ${state.max} ]`;
        document.getElementById(`tw-${id}`).href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(currentText + "\n- " + state.source)}`;
    };

    window.editArchive = function(id) {
        const item = archives.find(a => a.id == id);
        if(!item) return;
        currentEditId = item.id;
        document.getElementById('new-category').value = item.category;
        document.getElementById('new-source').value = item.source;
        document.getElementById('new-quote').value = item.chunks.join('\n\n');
        document.querySelector('.write-board h2').innerText = 'EDIT RECORD';
        document.getElementById('writeBoard').scrollIntoView({ behavior: 'smooth' });
    };

    window.deleteItem = function(id) {
        if(confirm("삭제하시겠습니까?")) {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.delete(id);
            tx.oncomplete = () => loadData();
        }
    };

    window.showMainCategory = function(cat, btn) {
        document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = cat;
        renderList();
    };

    window.onload = initDB;
</script>
</body>
</html>
