<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Archive</title>
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="My Sentence Archive">
    <meta name="twitter:description" content="나만의 문장 저장소 🦋">
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1516414447565-b14be0adf13e?w=1200">

    <style>
        :root { --bg: #000; --card-bg: #fff; --text: #1a1a1a; --accent: #d4af37; }
        body { background: var(--bg); color: #fff; font-family: 'serif'; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { padding: 40px 20px; text-align: center; }
        h1 { font-size: 1.8rem; letter-spacing: 3px; color: var(--accent); text-shadow: 0 2px 4px rgba(212,175,55,0.3); }
        .menu { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 0 20px 40px; max-width: 800px; }
        .menu button { background: #111; border: 1px solid var(--accent); color: var(--accent); padding: 10px 14px; cursor: pointer; border-radius: 4px; transition: 0.3s; font-size: 0.75rem; font-weight: bold; }
        .menu button:hover { background: var(--accent); color: #000; }
        .menu button.active { background: var(--accent); color: #000; box-shadow: 0 0 15px rgba(212,175,55,0.5); }
        .card { background: var(--card-bg); color: var(--text); padding: 50px 30px; border-radius: 0; width: 85%; max-width: 500px; min-height: 300px; display: none; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 30px 60px rgba(0,0,0,0.8); text-align: center; border: 1px solid #ddd; margin-bottom: 50px; }
        .emoji { font-size: 2.5rem; margin-bottom: 25px; }
        #lyric { font-size: 1.1rem; line-height: 1.8; margin-bottom: 40px; white-space: pre-line; font-style: italic; word-break: keep-all; font-weight: 500; }
        .btn-box { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        #refresh-btn { border: none; background: var(--accent); color: #000; padding: 16px; font-weight: bold; font-size: 0.9rem; cursor: pointer; }
        .tw-btn { border: 1px solid #1a1a1a; background: #000; color: #fff; padding: 14px; text-decoration: none; font-weight: bold; font-size: 0.8rem; cursor: pointer; text-align: center; }
    </style>
</head>
<body>
<header><h1>SENTENCE ARCHIVE</h1></header>
<div class="menu" id="mainMenu">
    <button onclick="loadContent('hamlet')">HAMLET</button>
    <button onclick="loadContent('tess')">TESS</button>
    <button onclick="loadContent('bird')">심보선 - 새</button>
    <button onclick="loadContent('stone')">김남주 - 돌멩이</button>
    <button onclick="loadContent('spring')">BTS - 봄날</button>
    <button onclick="loadContent('still')">정국 - Still With You</button>
    <button onclick="loadContent('psalms')">시편 (1, 8, 18편)</button>
    <button onclick="loadContent('bts')">BTS - BUTTERFLY</button>
    <button onclick="loadContent('nct')">NCT - PIANO</button>
</div>
<div id="display-card" class="card">
    <div id="emoji" class="emoji"></div>
    <p id="lyric"></p>
    <div class="btn-box">
        <button onclick="refresh()" id="refresh-btn">NEXT SENTENCE</button>
        <a id="tw" href="#" target="_blank" class="tw-btn">𝕏 POST TO TWITTER</a>
    </div>
</div>
<script>
    let currentCategory = '';
    const database = {
        hamlet: { emoji: "💀", list: ["To be, or not to be, that is the question", "The rest is silence.", "O, that this too too solid flesh would melt"] },
        tess: { emoji: "🚩", list: ["'Justice' was done", "It was a black flag."] },
        bird: { emoji: "🕊️", list: ["우리는 사랑을 나눈다.\n무엇을 원하는지도 모른 채.", "너는 날아갈 것이다.\n날아가지 마.\n너는 날아갈 것이다."] },
        stone: { emoji: "🪨", list: ["돌멩이 하나 되자고 했다\n강물 위에 파문 하나 자그맣게 내고", "불이 밀어낼 어둠의 영역 그 얼마일 거냐고"] },
        spring: { emoji: "🌸", list: [
            "보고 싶다 이렇게 말하니까 더 보고 싶다\n너희 사진을 보고 있어도 보고 싶다\n너무 야속한 시간 나는 우리가 밉다\n이젠 얼굴 한 번 보는 것 조차 힘들어진 우리가",
            "여긴 온통 겨울 뿐이야 8월에도 겨울이 와\n마음은 시간을 달려가네 홀로 남은 설국열차\n니 손 잡고 지구 반대편까지 가 이 겨울을 끝내고파",
            "그리움들이 얼마나 눈처럼 내려야\n그 봄날이 올까, friend?",
            "허공을 떠도는 작은 먼지처럼\n날리는 눈이 나라면\n조금 더 빨리 네게 닿을 수 있을 텐데",
            "눈꽃이 떨어져요 또 조금씩 멀어져요\n보고 싶다 보고 싶다\n얼마나 기다려야 또 몇 밤을 더 새워야\n널 보게 될까 만나게 될까",
            "추운 겨울 끝을 지나 다시 봄날이 올 때까지\n꽃 피울 때까지 그곳에 좀 더 머물러줘",
            "네가 변한 건지 아니면 내가 변한 건지\n이 순간 흐르는 시간조차 미워\n우리가 변한 거지 뭐 모두가 그런 거지 뭐",
            "그래 밉다 니가 넌 떠났지만\n단 하루도 너를 잊은 적이 없었지 난\n솔직히 보고 싶은데 이만 너를 지울게\n그게 널 원망하기보단 덜 아프니까",
            "시린 널 불어내 본다 연기처럼 하얀 연기처럼\n말로는 지운다 해도 사실 난 아직 널 보내지 못하는데",
            "You know it all, you're my best friend\n아침은 다시 올 거야\n어떤 어둠도 어떤 계절도 영원할 순 없으니까",
            "벚꽃이 피나봐요 이 겨울도 끝이 나요\n보고 싶다 보고 싶다\n조금만 기다리면 며칠 밤만 더 새우면\n만나러 갈게 데리러 갈게"
        ] },
        still: { emoji: "☔", list: [
            "낮게 깔린 목소리 머지않아 오겠지\n또다시 차가운 공기 속에 남겨진 채\n내리는 비가 가라앉을 때쯤 널 끌어안고 물어볼게",
            "그날 왜 그랬는지 왜 날 울렸는지\n뒤엉킨 채로 무너진 내 몸을 달래줘\n텅 빈 방 안에서 널 그리며 난 갇혀있네",
            "날 바라보는 그 미소 뒤에\n아름다운 보랏빛을 그려볼게요\n서로의 발걸음이 안 맞을 수도 있지만\n그대와 함께 이 길을 걷고 싶어요",
            "Still with you\n어두운 방 조명 하나 없이 익숙해지면 안 되는데\n그게 또 익숙해지네",
            "함께 웃고 함께 울고\n이 단순한 감정들이 내겐 전부였나 봐\n언제쯤일까 다시 그댈 마주한다면\n눈을 보고 말할래요 보고 싶었어요"
        ] },
        psalms: { emoji: "📜", list: [
            "복 있는 사람은 악인들의 꾀를 따르지 아니하며\n죄인들의 길에 서지 아니하며\n오만한 자들의 자리에 앉지 아니하고\n오직 여호와의 율법을 즐거워하여\n그의 율법을 주야로 묵상하는도다 (시편 1:1-2)",
            "여호와 우리 주여 주의 이름이\n온 땅에 어찌 그리 아름다운지요\n주의 영광이 하늘을 덮었나이다 (시편 8:1)",
            "사람이 무엇이기에 주께서 그를 생각하시며\n인자가 무엇이기에 주께서 그를 돌보시나이까 (시편 8:4)",
            "나의 힘이신 여호와여 내가 주를 사랑하나이다\n여호와는 나의 반석이시요 나의 요새시요\n나를 건지시는 이시요 나의 하나님이시요 (시편 18:1-2)",
            "주께서 나의 등불을 켜심이여\n여호와 내 하나님이 내 흑암을 밝히시리이다 (시편 18:28)",
            "그는 시냇가에 심은 나무가 철을 따라 열매를 맺으며\n그 잎사귀가 마르지 아니함 같으니\n그가 하는 모든 일이 다 형통하리로다 (시편 1:3)"
        ] },
        bts: { emoji: "🦋", list: ["곁에 머물러줄래 내게 약속해줄래", "손 대면 날아갈까 부서질까 겁나"] },
        nct: { emoji: "🎹", list: ["까만 건반과 하얀 건반 사이 우리가 함께 그린 이 노래", "내 삶의 가장 빛나는 곡 그건 바로 너야"] }
    };
    function loadContent(category) {
        currentCategory = category;
        const btns = document.querySelectorAll('.menu button');
        btns.forEach(b => b.classList.remove('active'));
        if (event) event.target.classList.add('active');
        document.getElementById('display-card').style.display = 'flex';
        refresh();
    }
    function refresh() {
        const data = database[currentCategory];
        const pick = data.list[Math.floor(Math.random() * data.list.length)];
        document.getElementById('emoji').innerText = data.emoji;
        document.getElementById('lyric').innerText = pick;
        document.getElementById('tw').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(pick)}`;
    }
</script>
</body>
</html>
