<!DOCTYPE html><html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Archive</title><style>
:root{
--bg:#000;
--card-bg:#fff;
--text:#1a1a1a;
--accent:#d4af37;
}

body{
background:var(--bg);
color:#fff;
font-family:serif;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

header{
padding:40px 20px;
text-align:center;
}

h1{
font-size:1.8rem;
letter-spacing:3px;
color:var(--accent);
text-shadow:0 0 8px rgba(212,175,55,0.5),0 2px 4px rgba(212,175,55,0.3);
}

/* category */
.category-menu{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
padding:0 20px 20px;
max-width:900px;
}

.category-menu button{
background:#222;
border:1px solid #666;
color:#ccc;
padding:12px 20px;
cursor:pointer;
border-radius:6px;
transition:.3s;
font-size:.9rem;
font-weight:bold;
}

.category-menu button.active{
background:var(--accent);
color:#000;
border-color:var(--accent);
box-shadow:0 0 15px rgba(212,175,55,.5);
}

/* sub menu */
.sub-menu{
display:none;
flex-wrap:wrap;
gap:8px;
justify-content:center;
padding:0 20px 40px;
max-width:900px;
width:100%;
}

.sub-menu.active{
display:flex;
}

.sub-menu button{
background:transparent;
border:1px solid var(--accent);
color:var(--accent);
padding:8px 14px;
cursor:pointer;
border-radius:4px;
transition:.3s;
font-size:.8rem;
}

.sub-menu button.active{
background:var(--accent);
color:#000;
}

/* card */
.card{
background:var(--card-bg);
color:var(--text);
padding:50px 30px;
width:85%;
max-width:500px;
min-height:300px;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 30px 60px rgba(0,0,0,0.8);
text-align:center;
border:1px solid #ddd;
margin-bottom:50px;
animation:fadeUp .5s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.emoji{
font-size:2.5rem;
margin-bottom:25px;
}

#lyric{
font-size:1.1rem;
line-height:1.8;
margin-bottom:40px;
white-space:pre-line;
font-style:italic;
}

.btn-box{
display:flex;
flex-direction:column;
gap:12px;
width:100%;
}

#refresh-btn{
border:none;
background:var(--accent);
color:#000;
padding:16px;
font-weight:bold;
cursor:pointer;
}

.tw-btn{
border:1px solid #1a1a1a;
background:#000;
color:#fff;
padding:14px;
text-decoration:none;
font-weight:bold;
font-size:.8rem;
}
</style></head><body><header>
<h1>SENTENCE ARCHIVE</h1>
</header><!-- main --><div class="category-menu">
<button onclick="showSubMenu('bts',this)">BTS</button>
<button onclick="showSubMenu('bible',this)">말씀</button>
<button onclick="showSubMenu('lit',this)">문학</button>
</div><!-- BTS --><div id="sub-bts" class="sub-menu">
<button onclick="loadContent('spring',this)">봄날</button>
<button onclick="loadContent('bts',this)">Butterfly</button>
</div><!-- Bible --><div id="sub-bible" class="sub-menu">
<button onclick="loadContent('psalm23',this)">시편 23편</button>
</div><!-- Literature --><div id="sub-lit" class="sub-menu">
<button onclick="loadContent('hamlet',this)">햄릿</button>
</div><!-- card --><div id="display-card" class="card">
<div id="emoji" class="emoji"></div>
<p id="lyric"></p><div class="btn-box">
<button onclick="refresh()" id="refresh-btn">NEXT SENTENCE</button>
<a id="tw" target="_blank" class="tw-btn">𝕏 POST</a>
</div>
</div><script>

let currentKey=null;
let currentList=[];

function showSubMenu(name,btn){

document.querySelectorAll('.category-menu button')
.forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

document.querySelectorAll('.sub-menu')
.forEach(m=>m.classList.remove('active'));

document.getElementById('sub-'+name)
.classList.add('active');

document.getElementById('display-card').style.display="none";
}

const database={

spring:{
emoji:"🌸",
list:[
"보고 싶다 이렇게 말하니까 더 보고 싶다",
"여긴 온통 겨울 뿐이야 8월에도 겨울이 와",
"추운 겨울 끝을 지나 다시 봄날이 올 때까지"
]
},

bts:{
emoji:"🦋",
list:[
"넌 마치 Butterfly 멀리서 훔쳐봐",
"시간을 멈출래 이 순간이 지나면",
"내 사랑은 영원인 걸 It's all free for you"
]
},

psalm23:{
emoji:"🌿",
list:[
"여호와는 나의 목자시니 내게 부족함이 없으리로다",
"그가 나를 푸른 풀밭에 누이시며 쉴 만한 물 가로 인도하시는도다",
"내 평생에 선하심과 인자하심이 반드시 나를 따르리니"
]
},

hamlet:{
emoji:"💀",
list:[
"To be, or not to be, that is the question.",
"The rest is silence.",
"What a piece of work is a man!"
]
}

};

function loadContent(key,btn){

document.querySelectorAll('.sub-menu button')
.forEach(b=>b.classList.remove('active'));

btn.classList.add('active');

currentKey=key;
currentList=database[key].list;

document.getElementById('emoji').textContent=
database[key].emoji;

showRandom();

document.getElementById('display-card').style.display="flex";
}

function showRandom(){

let text=currentList[
Math.floor(Math.random()*currentList.length)
];

document.getElementById('lyric').textContent=text;

let url="https://twitter.com/intent/tweet?text="+
encodeURIComponent(text);

document.getElementById('tw').href=url;
}

function refresh(){
if(!currentKey) return;
showRandom();
}

</script></body>
</html>
