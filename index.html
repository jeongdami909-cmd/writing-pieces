    function loadContent(category, element) {
        currentCategory = category;
        const btns = document.querySelectorAll('.menu button');
        btns.forEach(b => b.classList.remove('active'));
        if (element) element.classList.add('active');
        document.getElementById('display-card').style.display = 'flex';
        refresh();
    }
    function refresh() {
        const data = database[currentCategory];
        const pick = data.list[Math.floor(Math.random() * data.list.length)];
        document.getElementById('emoji').innerText = data.emoji;
        document.getElementById('lyric').innerText = pick;
        document.getElementById('tw').href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(pick)}`;
    }
